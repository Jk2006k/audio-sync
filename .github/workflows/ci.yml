name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
      EXPO_NO_TELEMETRY: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Expo Doctor
        run: npx expo-doctor

      # Ensures Metro/Babel can bundle for Android (Expo Go)
      - name: Android Bundle (Expo Export)
        run: npx expo export --platform android --output-dir dist-android

      - name: Validate Expo Config
        run: npx expo config --type public

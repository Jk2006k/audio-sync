name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
      EXPO_NO_TELEMETRY: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Typecheck
        run: bun run typecheck

      - name: Expo Doctor
        run: bunx expo-doctor

      # Ensures Metro/Babel can bundle for Android (Expo Go)
      - name: Android Bundle (Expo Export)
        run: bunx expo export --platform android --output-dir dist-android

      - name: Validate Expo Config
        run: bunx expo config --type public
